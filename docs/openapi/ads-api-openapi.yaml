openapi: 3.0.3
info:
  title: Ads API
  description: API for managing advertising campaigns and ads
  version: 1.0.0
  contact:
    name: API Support
    email: daniil.ternavskiy@mail.ru

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"

  /:
    get:
      summary: Root endpoint
      description: Returns a welcome message
      responses:
        '200':
          description: Welcome message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "ads-api running"

  /campaigns:
    post:
      summary: Create a new campaign
      description: Creates a new advertising campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
      responses:
        '201':
          description: Campaign created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid input"

  /campaigns/{id}:
    get:
      summary: Get a campaign by ID
      description: Retrieves a specific campaign by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Campaign retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "not found"
    put:
      summary: Update a campaign
      description: Updates an existing campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
      responses:
        '200':
          description: Campaign updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          description: Invalid input or update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Update failed"
    delete:
      summary: Delete a campaign
      description: Deletes a campaign by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Campaign deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "deleted"
        '400':
          description: Deletion failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Deletion failed"

  /ads:
    post:
      summary: Create a new ad
      description: Creates a new advertisement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ad'
      responses:
        '201':
          description: Ad created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid input"

  /ads/{id}:
    get:
      summary: Get an ad by ID
      description: Retrieves a specific ad by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ad retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '404':
          description: Ad not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "not found"
    put:
      summary: Update an ad
      description: Updates an existing ad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ad'
      responses:
        '200':
          description: Ad updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '400':
          description: Invalid input or update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Update failed"
    delete:
      summary: Delete an ad
      description: Deletes an ad by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ad deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "deleted"
        '400':
          description: Deletion failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Deletion failed"

components:
  schemas:
    Campaign:
      type: object
      required:
        - user_id
        - name
        - status
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the campaign
          readOnly: true
        user_id:
          type: integer
          format: int64
          description: ID of the user who owns the campaign
        name:
          type: string
          description: Name of the campaign
        status:
          type: string
          description: Status of the campaign (active, paused, etc.)
          enum: [active, paused, draft]

    Ad:
      type: object
      required:
        - campaign_id
        - title
        - status
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the ad
          readOnly: true
        campaign_id:
          type: integer
          format: int64
          description: ID of the campaign this ad belongs to
        title:
          type: string
          description: Title of the ad
        status:
          type: string
          description: Status of the ad (active, paused, etc.)
          enum: [active, paused, draft]