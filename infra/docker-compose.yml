version: '3.8'
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
       MYSQL_ROOT_PASSWORD: rootpassword
       MYSQL_DATABASE: ad_platform
       MYSQL_USER: dev
       MYSQL_PASSWORD: devpass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '8123:8123'
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'
      - '15672:15672'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  tarantool:
    image: tarantool/tarantool:2.10
    restart: unless-stopped
    ports:
      - '33013:33013'

  ads-api:
    build: ../services/ads-api
    depends_on:
      - mysql
      - rabbitmq
      - redis
    ports:
      - '8080:8080'
    environment:
      DB_DSN: dev:devpass@tcp(mysql:3306)/ad_platform?parseTime=true

  auth-api:
    build: ../services/auth-api
    depends_on:
      - mysql
      - redis
    ports:
      - '8000:8000'

  analytics-api:
    build: ../services/analytics-api
    depends_on:
      - clickhouse
      - rabbitmq
    ports:
      - '8100:8100'

  admin-panel:
    build: ../services/admin-panel
    depends_on:
      - mysql
    ports:
      - '8001:8000'

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - ads-api
      - auth-api
      - analytics-api

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - '9100:9100'

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DATA_SOURCE_NAME: 'metrics:metrics_password@(mysql:3306)/'
    volumes:
      - ./mysql/.my.cnf:/.my.cnf:ro
    ports:
      - '9104:9104'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  mysql_data:
  clickhouse_data:
  grafana_data:
  prometheus_data: