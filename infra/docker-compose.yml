version: '3.8'
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '8123:8123'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5672:5672'
      - '15672:15672'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  tarantool:
    image: tarantool/tarantool:2.10
    restart: unless-stopped
    ports:
      - '33013:33013'

  ads-api:
    build: ../services/ads-api
    env_file:
    - .env
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
         condition: service_started
      redis:
         condition: service_started
    ports:
      - '8080:8080'

  auth-api:
    build: ../services/auth-api
    env_file:
    - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
         condition: service_started
    ports:
      - '8000:8000'

  analytics-api:
    build: ../services/analytics-api
    env_file:
      - .env
    depends_on:
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - '8100:8100'

  admin-panel:
    build: ../services/admin-panel
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8001:8000'

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - ads-api
      - auth-api
      - analytics-api

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - '9100:9100'

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./mysql/.my.cnf:/.my.cnf:ro
    ports:
      - '9104:9104'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    env_file:
      - .env

volumes:
  mysql_data:
  clickhouse_data:
  grafana_data:
  prometheus_data: