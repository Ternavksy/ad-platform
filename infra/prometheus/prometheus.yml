global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ads-api'
    static_configs:
      - targets: ['ads-api:8080']

  - job_name: 'auth-api'
    static_configs:
      - targets: ['auth-api:8000']

  - job_name: 'analytics-api'
    static_configs:
      - targets: ['analytics-api:8100']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mysqld-exporter'
    static_configs:
      - targets: ['mysqld-exporter:9104']
